    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F8FAFC; color: #334155; }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 滚动监听 Hook
        const useScrollAnimation = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.15 });

                document.querySelectorAll('.fade-in-up').forEach((el) => observer.observe(el));
                return () => observer.disconnect();
            }, []);
        };

        // 导航进度条
        const ProgressNav = () => {
            const [progress, setProgress] = useState(0);
            useEffect(() => {
                const handleScroll = () => {
                    const scrollPx = document.documentElement.scrollTop;
                    const winHeightPx = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    setProgress(`${scrollPx / winHeightPx * 100}%`);
                }
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return (
                <div className="fixed top-0 left-0 w-full h-1 z-50 bg-gray-100">
                    <div className="h-full bg-brand-500 transition-all duration-150 ease-out" style={{ width: progress }}></div>
                </div>
            );
        };

        // 章节标题组件

                <h2 className="text-4xl md:text-5xl font-bold text-dark mb-4">{title}</h2>
                {desc && <p className="text-gray-500 text-lg max-w-3xl leading-relaxed">{desc}</p>}
            </div>
        );

            useScrollAnimation();

                        <div className="absolute bottom-20 left-10 w-64 h-64 bg-blue-50 rounded-full blur-3xl -z-10"></div>

                        <div className="max-w-7xl mx-auto w-full grid lg:grid-cols-12 gap-12 items-center">

                                </p>

                                        </div>
                                    </div>

                    </section>

                    {/* ==================== 02 双钻设计模型 (全新重构) ==================== */}
                    <section className="py-24 px-6 lg:px-24 bg-white relative">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16 fade-in-up">
                                <h2 className="text-3xl md:text-4xl font-bold text-dark mb-4">全链路推导：基于“阿里五导家”的设计策略</h2>
                                <p className="text-gray-500">从发现业务痛点到最终体验落地，确保每一个像素的改变都有其业务依据</p>
                            </div>

                            {/* 纯代码绘制的双钻模型 */}
                            <div className="w-full overflow-x-auto pb-10 fade-in-up delay-100">
                                <div className="min-w-[900px]">
                                    
                                    {/* 顶部标签 */}
                                    <div className="flex justify-between px-[15%] text-sm font-bold text-gray-500 mb-8 relative z-10">

                                            </div>

                                        {/* 右侧钻石：解决方案空间 */}

                                            <div className="diamond-content">
                                                <div className="text-brand-500 font-bold text-lg mb-1">推动落地</div>
                                                <div className="text-xs text-gray-400 flex flex-col gap-1">
                                                    <span>交互设计 ——</span>
                                                    <span>—— 视觉实现</span>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* 终点 */}
                                        <div className="connector-dot" style={{ right: '10%' }}></div>
                                    </div>

                                    {/* 底部详细阶段与产出物映射 (结合集互通项目) */}
                                    <div className="grid grid-cols-5 gap-4 px-[5%] text-center relative z-10">
                                        <div>
                                            <h4 className="font-bold text-primary-600 mb-4 border-b border-gray-100 pb-2">01 定义问题</h4>
                                            <ul className="text-sm text-gray-500 space-y-2">
                                                <li>系统架构割裂</li>
                                                <li>操作路径冗长</li>
                                                <li>新手学习成本极高</li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-primary-600 mb-4 border-b border-gray-100 pb-2">02 用户研究</h4>
                                            <ul className="text-sm text-gray-500 space-y-2">
                                                <li>客服频繁切屏录单</li>
                                                <li>管理者报表维度单一</li>
                                                <li>权限分配极易出错</li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-brand-500 mb-4 border-b border-gray-100 pb-2">03 确认目标</h4>
                                            <ul className="text-sm text-gray-500 space-y-2 font-medium">

                            />

                                        <div className="w-10 h-10 bg-brand-50 rounded-lg flex items-center justify-center text-brand-500 mb-4"><i className="ph-fill ph-layout text-xl"></i></div>

                                            <span className="font-bold text-brand-500">策略：</span>打破系统层级，采用F型浏览动线。将最高频的“待办事项”(发货/退款)提取为大数字微件，直接点击穿透。将复杂的入口收敛至“便捷入口”区域。
                                        </p>

                                </div>
                                <div>
                                    <h4 className="text-xl font-bold mb-3 flex items-center gap-2"><span className="text-brand-500">#02</span> 视觉降噪的主窗口</h4>
                                    <p className="text-gray-500 text-sm leading-relaxed">中区的对话气泡去除了复杂的边框与阴影，采用扁平化色块（客服品牌橙色 vs 用户浅灰色）。在长文本阅读场景下，充足的内部留白（Padding）能显著减轻视觉压迫感。</p>
                                </div>
                                <div>
                                    <h4 className="text-xl font-bold mb-3 flex items-center gap-2"><span className="text-brand-500">#03</span> 上下文即刻获取 (核心突破)</h4>
                                    <p className="text-gray-500 text-sm leading-relaxed">右侧情报区是提升能效的<span className="highlight-b">胜负手</span>。将用户的CRM标签（VIP、高价值）和最近交易订单集成至当前页面。客服回复“尺码有点小”时，视线向右微移即可看到购买的具体商品和物流状态，实现“秒级响应”。</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ==================== 05 深度分析 3：表单与权限逻辑降维 ==================== */}
                    <section className="py-24 px-6 lg:px-24 bg-surface">
                        <div className="max-w-7xl mx-auto">
                            <SectionHeader 
                                subtitle="Insight 03: Complex Forms & Matrices" 
                                title="对抗密集恐惧：复杂表单的拆解与重构" 
                                desc="B端产品最大的痛点往往隐藏在长表单和巨型矩阵配置中。如何让用户在录入信息时不感到绝望？核心法则：渐进式披露 (Progressive Disclosure)。" 
                            />

                            <div className="grid lg:grid-cols-2 gap-16">
                                {/* 图3 - 商品发布表单 */}
                                <div className="fade-in-up">
                                    <div className="mb-6">
                                        <h3 className="text-2xl font-bold text-dark mb-2">长表单的分步化 (Wizard)</h3>
                                        <p className="text-gray-500 text-sm">面对包含近30个字段的商品发布页面，如果采用“一镜到底”，用户极易中途放弃或迷失定位。</p>
                                    </div>
                                    <img src="3.jpg" alt="商品发布" className="w-full rounded-xl shadow-lg border border-gray-200 mb-6" />
                                    <div className="bg-white p-5 rounded-xl border-l-4 border-brand-500">
                                        <h4 className="font-bold text-dark mb-1">设计解法</h4>
                                        <ul className="text-sm text-gray-500 space-y-2 list-disc pl-4">
                                            <li><span className="font-bold text-dark">横向步骤拆解：</span> 将任务拆分为“选择分类 -> 基本信息 -> 发布成功”三大步，建立强烈的心理预期。</li>
                                            <li><span className="font-bold text-dark">视觉卡片分组：</span> 即便在“基本信息”中，也利用橙色标题块和微弱灰底，将“基本信息”、“价格库存”、“服务上架”在视觉上进行格式塔隔离。</li>
                                            <li><span className="font-bold text-dark">控件优化：</span> 运用单选框(Radio)和胶囊按钮替代冗长的下拉菜单，减少点击次数。</li>
                                        </ul>
                                    </div>
                                </div>

                                {/* 图5 - 账号权限 */}
                                <div className="fade-in-up delay-200">
                                    <div className="mb-6">
                                        <h3 className="text-2xl font-bold text-dark mb-2">网格矩阵降维 (Matrix)</h3>
                                        <p className="text-gray-500 text-sm">ERP权限分配通常是一个巨大的树状结构，展开后满屏复选框，管理员勾选时极易错漏。</p>
                                    </div>
                                    <img src="05-账号权限.png" alt="账号权限" className="w-full rounded-xl shadow-lg border border-gray-200 mb-6" />
                                    <div className="bg-white p-5 rounded-xl border-l-4 border-blue-500">
                                        <h4 className="font-bold text-dark mb-1">设计解法</h4>
                                        <ul className="text-sm text-gray-500 space-y-2 list-disc pl-4">
                                            <li><span className="font-bold text-dark">三层逻辑结构：</span> 顶部“管理范围”定义大盘 -> 中间Tabs切片(系统参数/角色/功能)切割模块 -> 底部网格化展示具体权限。</li>
                                            <li><span className="font-bold text-dark">防错机制：</span> 强化的橙色勾选状态，提供清晰的视觉确认。</li>
                                            <li><span className="font-bold text-dark">批量提效：</span> 右上角常驻“全选/反选/清空”高频动作条，针对新员工入职场景，配置时间从3分钟缩短至10秒。</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ==================== 06 列表设计法则 ==================== */}
                    <section className="py-24 px-6 lg:px-24 bg-dark text-white">
                        <div className="max-w-7xl mx-auto">
                             <div className="mb-16 fade-in-up">
                                <p className="text-brand-400 font-bold tracking-widest text-sm mb-2 uppercase">Insight 04: Data Tables</p>
                                <h2 className="text-4xl md:text-5xl font-bold text-white mb-4">列表的行动导向：过滤与状态外显</h2>
                            </div>

                            <div className="grid lg:grid-cols-12 gap-12 items-center fade-in-up">
                                <div className="lg:col-span-8">
                                    <img src="2.jpg" alt="客户列表" className="w-full rounded-xl shadow-2xl border border-gray-700" />
                                </div>
                                <div className="lg:col-span-4 space-y-8">
                                    <div>
                                        <div className="w-8 h-8 rounded-full bg-brand-500/20 text-brand-400 flex items-center justify-center font-bold mb-3 border border-brand-500/30">1</div>
                                        <h3 className="text-xl font-bold mb-2">高频筛选平铺与高级收起</h3>
                                        <p className="text-gray-400 text-sm">将“全部、普通客户、优质客户”作为顶部快捷Tabs。仅将“创建时间、标签”等低频或复杂的组合查询放入下拉表单，避免表单区过大挤压数据可视区高度。</p>
                                    </div>
                                    <div>
                                        <div className="w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center font-bold mb-3 border border-blue-500/30">2</div>
                                        <h3 className="text-xl font-bold mb-2">状态字段符号化</h3>
                                        <p className="text-gray-400 text-sm">B端表格最忌讳全是黑白文字。设计中将“人群定义”用微弱色块（蓝底新客、红底流失）包裹，“跟进状态”前置红/绿提示圆点。利用大脑对色彩的识别速度远大于文字的原理，提升检视效率。</p>
                                    </div>
                                    <div>
                                        <div className="w-8 h-8 rounded-full bg-gray-500/20 text-gray-300 flex items-center justify-center font-bold mb-3 border border-gray-500/30">3</div>
                                        <h3 className="text-xl font-bold mb-2">操作按钮解构</h3>
                                        <p className="text-gray-400 text-sm">彻底废弃表格行末“操作->下拉->编辑”的三级交互。直接将核心高频操作“跟进”、“编辑”以平铺文字按钮展示，减少了50%的无效鼠标点击。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ==================== 07 结语与复盘 ==================== */}
                    <section className="py-24 px-6 lg:px-24 bg-surface text-center">
                        <div className="max-w-4xl mx-auto fade-in-up">
                            <h2 className="text-3xl font-bold text-dark mb-6">价值复盘：好的设计，是用数据说话的</h2>
                            <p className="text-gray-500 mb-12 text-lg">
                                本次集互通的重构不仅是视觉层面的“换肤”，更是底层业务流的再造。我们通过定义问题、推导策略，最终将冰冷的功能转化为赋能人效的工具。
                            </p>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <div className="text-3xl font-bold text-brand-500 mb-1">↓ 35%</div>
                                    <div className="text-sm text-gray-400">客服人均响应时间</div>
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <div className="text-3xl font-bold text-brand-500 mb-1">↑ 2.5倍</div>
                                    <div className="text-sm text-gray-400">报表日均查看频次</div>
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <div className="text-3xl font-bold text-brand-500 mb-1">↓ 60%</div>
                                    <div className="text-sm text-gray-400">新员工培训耗时</div>
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <div className="text-3xl font-bold text-dark mb-1">一致性</div>
                                    <div className="text-sm text-gray-400">前端组件化落地提升</div>
                                </div>
                            </div>

                            <div className="inline-flex items-center gap-2 text-brand-500 font-bold tracking-widest text-lg hover:text-brand-600 transition-colors">
                                <i className="ph-fill ph-check-circle text-2xl"></i> END OF CASE STUDY
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
